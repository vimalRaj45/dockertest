spring.application.name=dockertest

# PostgreSQL Database Configuration
# Fallback defaults to the Neon Database provided by the user.
# In production (Render) or local compose, these are overridden by environment variables or Spring Boot Docker Compose.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-fragrant-field-ap8wb8z4-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_UiY5nTrAclD2}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable template caching reload for development (optional, disabled for safety)
spring.thymeleaf.cache=false

# Disable Spring Boot's automatic Docker Compose lookup on startup so the host application
# can boot up and connect directly to Neon without requiring Docker Desktop to be running.
spring.docker.compose.enabled=false
